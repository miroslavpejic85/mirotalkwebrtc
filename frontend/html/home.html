<!doctype html>
<html lang="en">
    <head>
        <title>MiroTalk WebRTC admin login</title>
        <link rel="apple-touch-icon" href="../Images/apple-touch-icon.png" />
        <link rel="icon" type="image/x-icon" href="../Images/favicon.ico" />

        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="MiroTalk WebRTC admin panel, for rooms scheduling." />

        <!-- https://ogp.me -->

        <meta property="og:type" content="{{OG_TYPE}}" />
        <meta property="og:site_name" content="{{OG_SITE_NAME}}" />
        <meta property="og:title" content="{{OG_TITLE}}" />
        <meta property="og:description" content="{{OG_DESCRIPTION}}" />
        <meta property="og:image" content="{{OG_IMAGE}}" />
        <meta property="og:url" content="{{OG_URL}}" />

        <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
        <link rel="stylesheet" href="../css/home.css" />
        <link rel="stylesheet" href="../css/common.css" />

        <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11.6.15"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

        <script async src="../js/stats.js"></script>
        <script defer src="../js/swal.js"></script>
        <script defer src="../js/api.js"></script>
        <script defer src="../js/home.js"></script>
        <script defer src="../js/translate.js"></script>
    </head>
    <body>
        <div class="main">
            <div class="tab-header">
                <button id="tabLogin" class="tab-btn active" type="button">Login</button>
                <button id="tabSignup" class="tab-btn" type="button">Sign up</button>
            </div>

            <div class="tab-content">
                <div id="loginPanel" class="tab-panel active">
                    <div class="input-group">
                        <i class="uil uil-user"></i>
                        <input id="loginUsernameInput" type="text" name="User name" placeholder="User name" required />
                    </div>
                    <div class="input-group">
                        <i class="uil uil-envelope"></i>
                        <input id="loginEmailIdInput" type="email" name="Email" placeholder="Email" required />
                    </div>
                    <div class="input-group">
                        <i class="uil uil-lock"></i>
                        <input
                            id="loginPasswordIdInput"
                            type="password"
                            name="Password"
                            placeholder="Password"
                            required
                        />
                        <button type="button" class="password-toggle" tabindex="-1"><i class="uil uil-eye"></i></button>
                    </div>
                    <button id="loginBtn"><i class="uil uil-sign-in-alt"></i> Login</button>
                    <a id="forgotPasswordLink" href="/password-forgot">Forgot Password?</a>
                </div>

                <div id="signupPanel" class="tab-panel">
                    <div class="input-group">
                        <i class="uil uil-user"></i>
                        <input id="signupUsernameInput" type="text" name="User name" placeholder="User name" required />
                    </div>
                    <div class="input-group">
                        <i class="uil uil-envelope"></i>
                        <input id="signupEmailIdInput" type="email" name="Email" placeholder="Email" required />
                    </div>
                    <div class="input-group">
                        <i class="uil uil-lock"></i>
                        <input
                            id="signupPasswordIdInput"
                            type="password"
                            name="Password"
                            placeholder="Password"
                            required
                        />
                        <button type="button" class="password-toggle" tabindex="-1"><i class="uil uil-eye"></i></button>
                    </div>
                    <div class="input-group">
                        <i class="uil uil-lock"></i>
                        <input
                            id="signupRepeatPasswordIdInput"
                            type="password"
                            name="Confirm password"
                            placeholder="Confirm password"
                            required
                        />
                        <button type="button" class="password-toggle" tabindex="-1"><i class="uil uil-eye"></i></button>
                    </div>
                    <button id="signupTermsBtn">Read Terms & Conditions</button>
                    <button id="signupBtn"><i class="uil uil-user-plus"></i> Sign up</button>
                </div>
            </div>

            <p id="supportBtn">&copy; 2026 MiroTalk, all rights reserved</p>
        </div>
    </body>
</html>
